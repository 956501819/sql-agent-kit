agent:
  confidence_threshold: 0.6
  max_retry: 3
  max_tables_in_prompt: 10
executor:
  max_rows: 500
  query_timeout: 30
feedback:
  enabled: true
  log_path: ./logs/queries.jsonl
fewshot:
  store_path: ./data/fewshot.json
  top_k: 3
llm:
  bailian:
    max_tokens: 2048
    model: qwen-plus
    temperature: 0.0
  openai:
    max_tokens: 2048
    model: gpt-4o
    temperature: 0.0
  provider: siliconflow
  qwen:
    max_tokens: 2048
    model: qwen-plus
    temperature: 0.0
  siliconflow:
    max_tokens: 2048
    model: Qwen/Qwen2.5-72B-Instruct
    temperature: 0.0
